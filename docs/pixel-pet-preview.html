<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>像素宠物形象预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    gap: 60px;
    flex-wrap: wrap;
    padding: 40px;
    image-rendering: pixelated;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .label { color: rgba(255,146,43,0.6); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; }
  .pet-wrap { position: relative; width: 128px; height: 128px; cursor: pointer; image-rendering: pixelated; }
  .mood-btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 320px; }
  .mood-btn {
    padding: 5px 12px;
    border: 2px solid rgba(255,146,43,0.3);
    border-radius: 0;
    background: rgba(255,146,43,0.06);
    color: rgba(255,146,43,0.6);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.1s;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .mood-btn:hover, .mood-btn.active {
    background: rgba(255,146,43,0.2);
    border-color: rgba(255,146,43,0.7);
    color: #ff922b;
  }

  /* 待机跳动 */
  @keyframes pixel-idle {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-3px); }
  }
  /* 高兴跳跳 */
  @keyframes pixel-happy {
    0%, 100% { transform: translateY(0) scaleX(1); }
    30%       { transform: translateY(-10px) scaleX(1.1); }
    50%       { transform: translateY(-12px) scaleX(0.9); }
    70%       { transform: translateY(-8px) scaleX(1.05); }
  }
  /* 困惑摇头 */
  @keyframes pixel-confused {
    0%, 100% { transform: translateX(0); }
    25%       { transform: translateX(-4px); }
    75%       { transform: translateX(4px); }
  }
  /* 睡觉 */
  @keyframes pixel-sleep {
    0%, 100% { transform: rotate(-3deg) translateY(0); }
    50%       { transform: rotate(-3deg) translateY(-2px); }
  }
  /* 说话 */
  @keyframes pixel-talking {
    0%, 100% { transform: scaleY(1); }
    50%       { transform: scaleY(0.96) translateY(1px); }
  }
  /* 眩晕 */
  @keyframes pixel-dizzy {
    0%, 100% { transform: rotate(-4deg); }
    50%       { transform: rotate(4deg); }
  }
  /* 像素闪烁 */
  @keyframes pixel-blink {
    0%, 85%, 100% { opacity: 1; }
    92%            { opacity: 0; }
  }
  /* 星星闪烁 */
  @keyframes star-twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%       { opacity: 1; transform: scale(1.2); }
  }
  /* 眩晕螺旋 */
  @keyframes spiral-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  /* 彩虹色循环 */
  @keyframes rainbow-cycle {
    0%   { fill: #ff6b6b; }
    16%  { fill: #ffa94d; }
    33%  { fill: #ffd43b; }
    50%  { fill: #69db7c; }
    66%  { fill: #74c0fc; }
    83%  { fill: #da77f2; }
    100% { fill: #ff6b6b; }
  }

  .body-group { animation: pixel-idle 1.5s ease-in-out infinite; transform-origin: center bottom; }
  .mood-happy   .body-group { animation: pixel-happy 0.5s ease-in-out infinite !important; }
  .mood-confused .body-group { animation: pixel-confused 0.4s ease-in-out infinite !important; }
  .mood-sleep   .body-group { animation: pixel-sleep 2s ease-in-out infinite !important; }
  .mood-talking .body-group { animation: pixel-talking 0.25s ease-in-out infinite !important; }
  .mood-dizzy   .body-group { animation: pixel-dizzy 0.45s ease-in-out infinite !important; transform-origin: 64px 64px; }

  .eye-pixel { animation: pixel-blink 3s step-end infinite; }
  .star-1 { animation: star-twinkle 1.2s ease-in-out infinite; }
  .star-2 { animation: star-twinkle 1.2s ease-in-out infinite 0.4s; }
  .star-3 { animation: star-twinkle 1.2s ease-in-out infinite 0.8s; }
  .rainbow-pixel { animation: rainbow-cycle 2s linear infinite; }

  .dizzy-eye-l { transform-origin: 40px 44px; animation: spiral-spin 1s linear infinite; }
  .dizzy-eye-r { transform-origin: 80px 44px; animation: spiral-spin 1s linear infinite reverse; }
</style>
</head>
<body>

<div class="stage">
  <div class="label">PIXEL PET · 8-BIT MODE</div>
  <div class="pet-wrap" id="mainPet">
    <!-- 像素宠物：全部用 rect 拼接，模拟像素点阵 -->
    <!-- 每个像素块 = 8×8px，viewBox = 128×128 = 16×16 像素格 -->
    <svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg"
         style="image-rendering:pixelated">
      <defs>
        <filter id="pixelGlow">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="dropShadow">
          <feDropShadow dx="2" dy="2" stdDeviation="0" flood-color="#000" flood-opacity="0.5"/>
        </filter>
      </defs>

      <g class="body-group">

        <!-- 耳朵（像素块） -->
        <rect x="24" y="16" width="16" height="16" fill="#e67700"/>
        <rect x="88" y="16" width="16" height="16" fill="#e67700"/>
        <!-- 耳朵内 -->
        <rect x="28" y="20" width="8"  height="8"  fill="#ff922b"/>
        <rect x="92" y="20" width="8"  height="8"  fill="#ff922b"/>

        <!-- 头部主体（橙色像素块） -->
        <rect x="16" y="32" width="96" height="64" fill="#ff922b"/>
        <!-- 头部暗色边框 -->
        <rect x="16" y="32" width="96" height="8"  fill="#e67700"/><!-- 顶 -->
        <rect x="16" y="88" width="96" height="8"  fill="#e67700"/><!-- 底 -->
        <rect x="16" y="32" width="8"  height="64" fill="#e67700"/><!-- 左 -->
        <rect x="104" y="32" width="8" height="64" fill="#e67700"/><!-- 右 -->
        <!-- 头部高光 -->
        <rect x="24" y="40" width="32" height="8"  fill="#ffa94d" opacity="0.6"/>
        <rect x="24" y="40" width="8"  height="24" fill="#ffa94d" opacity="0.4"/>

        <!-- 面部区域（深色背景） -->
        <rect x="24" y="40" width="80" height="48" fill="#1a0a2e"/>
        <!-- 面部边框 -->
        <rect x="24" y="40" width="80" height="4"  fill="#e67700"/>
        <rect x="24" y="84" width="80" height="4"  fill="#e67700"/>
        <rect x="24" y="40" width="4"  height="48" fill="#e67700"/>
        <rect x="100" y="40" width="4" height="48" fill="#e67700"/>

        <!-- 眼睛左（像素块组合） -->
        <g class="eye-l eye-pixel">
          <rect x="32" y="48" width="24" height="20" fill="#ff922b" opacity="0.15"/>
          <rect x="36" y="52" width="16" height="12" fill="#ff922b" filter="url(#pixelGlow)"/>
          <rect x="40" y="56" width="8"  height="4"  fill="#ffe8cc"/>
          <!-- 高光像素 -->
          <rect x="40" y="52" width="4"  height="4"  fill="white" opacity="0.8"/>
        </g>
        <!-- 眼睛右 -->
        <g class="eye-r eye-pixel">
          <rect x="72" y="48" width="24" height="20" fill="#ff922b" opacity="0.15"/>
          <rect x="76" y="52" width="16" height="12" fill="#ff922b" filter="url(#pixelGlow)"/>
          <rect x="80" y="56" width="8"  height="4"  fill="#ffe8cc"/>
          <rect x="80" y="52" width="4"  height="4"  fill="white" opacity="0.8"/>
        </g>

        <!-- 嘴巴（像素点） -->
        <g id="mouthGroup">
          <rect x="44" y="72" width="4" height="4" fill="#ff922b"/>
          <rect x="52" y="76" width="4" height="4" fill="#ff922b"/>
          <rect x="60" y="76" width="4" height="4" fill="#ff922b"/>
          <rect x="68" y="76" width="4" height="4" fill="#ff922b"/>
          <rect x="76" y="72" width="4" height="4" fill="#ff922b"/>
        </g>

        <!-- 腮红（像素块） -->
        <rect x="28" y="68" width="12" height="8" fill="#ff6b6b" opacity="0.4"/>
        <rect x="88" y="68" width="12" height="8" fill="#ff6b6b" opacity="0.4"/>

        <!-- 身体 -->
        <rect x="32" y="96" width="64" height="24" fill="#e67700"/>
        <rect x="32" y="96" width="64" height="8"  fill="#ff922b"/><!-- 顶高光 -->
        <rect x="32" y="96" width="8"  height="24" fill="#e67700" opacity="0.5"/>
        <rect x="88" y="96" width="8"  height="24" fill="#cc5500" opacity="0.5"/>

        <!-- 彩虹腰带 -->
        <rect x="32" y="104" width="64" height="4" fill="#ff6b6b"/>
        <rect x="32" y="108" width="64" height="4" fill="#ffd43b"/>
        <rect x="32" y="112" width="64" height="4" fill="#69db7c"/>

        <!-- 腿 -->
        <rect x="36" y="120" width="20" height="8" fill="#e67700"/>
        <rect x="72" y="120" width="20" height="8" fill="#e67700"/>
        <!-- 鞋子 -->
        <rect x="32" y="124" width="28" height="4" fill="#cc5500"/>
        <rect x="68" y="124" width="28" height="4" fill="#cc5500"/>

        <!-- 装饰星星 -->
        <g class="star-1">
          <rect x="108" y="36" width="4" height="4" fill="#ffd43b"/>
          <rect x="112" y="32" width="4" height="4" fill="#ffd43b"/>
          <rect x="108" y="28" width="4" height="4" fill="#ffd43b"/>
          <rect x="104" y="32" width="4" height="4" fill="#ffd43b"/>
        </g>
        <g class="star-2">
          <rect x="12" y="52" width="4" height="4" fill="#74c0fc"/>
          <rect x="16" y="48" width="4" height="4" fill="#74c0fc"/>
          <rect x="12" y="44" width="4" height="4" fill="#74c0fc"/>
          <rect x="8"  y="48" width="4" height="4" fill="#74c0fc"/>
        </g>
        <g class="star-3">
          <rect x="108" y="72" width="4" height="4" fill="#da77f2"/>
          <rect x="112" y="68" width="4" height="4" fill="#da77f2"/>
          <rect x="108" y="64" width="4" height="4" fill="#da77f2"/>
          <rect x="104" y="68" width="4" height="4" fill="#da77f2"/>
        </g>

      </g>

      <!-- 地面阴影（像素风） -->
      <rect x="24" y="126" width="80" height="2" fill="rgba(0,0,0,0.4)"/>
    </svg>
  </div>

  <div class="mood-btns">
    <button class="mood-btn active" onclick="setMood('idle',this)">IDLE</button>
    <button class="mood-btn" onclick="setMood('happy',this)">HAPPY</button>
    <button class="mood-btn" onclick="setMood('confused',this)">CONFUSED</button>
    <button class="mood-btn" onclick="setMood('sleep',this)">SLEEP</button>
    <button class="mood-btn" onclick="setMood('talking',this)">TALKING</button>
    <button class="mood-btn" onclick="setMood('dizzy',this)">DIZZY</button>
  </div>
</div>

<script>
  const pet = document.getElementById('mainPet');
  const P = 4; // 像素块大小

  // 眼睛像素模板
  const eyeTemplates = {
    idle: (x, y) => `
      <rect x="${x}" y="${y}" width="24" height="20" fill="#ff922b" opacity="0.15"/>
      <rect x="${x+4}" y="${y+4}" width="16" height="12" fill="#ff922b" filter="url(#pixelGlow)"/>
      <rect x="${x+8}" y="${y+8}" width="8" height="4" fill="#ffe8cc"/>
      <rect x="${x+8}" y="${y+4}" width="4" height="4" fill="white" opacity="0.8"/>`,

    happy: (x, y) => `
      <rect x="${x}" y="${y}" width="24" height="20" fill="#ff922b" opacity="0.1"/>
      <rect x="${x+2}" y="${y+10}" width="20" height="6" fill="#ff922b" filter="url(#pixelGlow)"/>
      <rect x="${x+6}" y="${y+6}" width="4" height="4" fill="#ff922b" opacity="0.8"/>
      <rect x="${x+14}" y="${y+6}" width="4" height="4" fill="#ff922b" opacity="0.8"/>
      <rect x="${x+8}" y="${y+10}" width="4" height="4" fill="#ffe8cc"/>`,

    confused: (x, y, side) => side === 'L' ? `
      <rect x="${x}" y="${y}" width="24" height="20" fill="#ff922b" opacity="0.15"/>
      <rect x="${x+4}" y="${y+4}" width="16" height="12" fill="#ff922b" filter="url(#pixelGlow)"/>
      <rect x="${x+8}" y="${y+8}" width="8" height="4" fill="#ffe8cc"/>
      <rect x="${x+8}" y="${y+4}" width="4" height="4" fill="white" opacity="0.8"/>` : `
      <rect x="${x}" y="${y}" width="24" height="20" fill="#ff922b" opacity="0.15"/>
      <rect x="${x+4}" y="${y+8}" width="16" height="6" fill="#ff922b" filter="url(#pixelGlow)"/>
      <rect x="${x+4}" y="${y+4}" width="16" height="4" fill="#cc5500" opacity="0.6"/>
      <rect x="${x+8}" y="${y+10}" width="4" height="2" fill="#ffe8cc"/>`,

    sleep: (x, y) => `
      <rect x="${x}" y="${y}" width="24" height="20" fill="#1a0a2e" opacity="0.8"/>
      <rect x="${x+4}" y="${y+9}" width="16" height="4" fill="#ff922b" opacity="0.5"/>
      <rect x="${x+6}" y="${y+9}" width="12" height="4" fill="#ffa94d" opacity="0.4"/>`,

    talking: (x, y) => `
      <rect x="${x}" y="${y}" width="24" height="20" fill="#ff922b" opacity="0.2"/>
      <rect x="${x+2}" y="${y+2}" width="20" height="16" fill="#ff922b" filter="url(#pixelGlow)"/>
      <rect x="${x+6}" y="${y+6}" width="12" height="8" fill="#ffe8cc"/>
      <rect x="${x+6}" y="${y+6}" width="4" height="4" fill="white" opacity="0.8"/>`,

    dizzy: (x, y, side) => {
      const cls = side === 'L' ? 'dizzy-eye-l' : 'dizzy-eye-r';
      const cx = x + 12, cy = y + 10;
      return `
      <rect x="${x}" y="${y}" width="24" height="20" fill="#1a0a2e" opacity="0.9"/>
      <g class="${cls}">
        <rect x="${cx-8}" y="${cy-1}" width="16" height="2" fill="#ff922b" opacity="0.5"/>
        <rect x="${cx-1}" y="${cy-8}" width="2" height="16" fill="#ff922b" opacity="0.5"/>
        <rect x="${cx-6}" y="${cy-6}" width="4" height="4" fill="#ffd43b" opacity="0.7"/>
        <rect x="${cx+2}" y="${cy+2}" width="4" height="4" fill="#ffd43b" opacity="0.7"/>
        <rect x="${cx-1}" y="${cy-1}" width="2" height="2" fill="#ffe8cc"/>
      </g>`;
    }
  };

  // 嘴巴像素配置 [x, y] 坐标数组
  const mouthConfigs = {
    idle:     [[44,72],[52,76],[60,76],[68,76],[76,72]],
    happy:    [[40,76],[48,72],[56,68],[64,68],[72,72],[80,76]],
    confused: [[44,72],[52,72],[60,74],[68,76],[76,76]],
    sleep:    [[48,74],[56,74],[64,74],[72,74]],
    talking:  [[44,72],[52,68],[60,72],[68,68],[76,72]],
    dizzy:    [[44,76],[52,72],[60,76],[68,72],[76,76]],
  };

  function setEyes(mood) {
    const eyeL = pet.querySelector('.eye-l');
    const eyeR = pet.querySelector('.eye-r');
    const fn = eyeTemplates[mood] || eyeTemplates.idle;
    eyeL.innerHTML = fn(32, 48, 'L');
    eyeR.innerHTML = fn(72, 48, 'R');
    const blinkMoods = ['idle'];
    eyeL.style.animation = blinkMoods.includes(mood) ? '' : 'none';
    eyeR.style.animation = blinkMoods.includes(mood) ? '' : 'none';
    if (mood === 'talking') {
      eyeL.style.animation = 'pixel-blink 0.3s step-end infinite';
      eyeR.style.animation = 'pixel-blink 0.3s step-end infinite 0.08s';
    }
  }

  function setMouth(mood) {
    const group = pet.querySelector('#mouthGroup');
    const pts = mouthConfigs[mood] || mouthConfigs.idle;
    group.innerHTML = pts.map(p =>
      `<rect x="${p[0]}" y="${p[1]}" width="4" height="4" fill="#ff922b"/>`
    ).join('');
  }

  function setMood(mood, btn) {
    pet.className = 'pet-wrap';
    if (mood !== 'idle') pet.classList.add('mood-' + mood);
    setEyes(mood);
    setMouth(mood);
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>
</body>
</html>
