<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>毛毛虫形象预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'PingFang SC', sans-serif;
    gap: 60px;
    flex-wrap: wrap;
    padding: 40px;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .label {
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .pet-wrap {
    position: relative;
    width: 140px;
    height: 100px;
    cursor: pointer;
  }
  .mood-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 320px;
  }
  .mood-btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mood-btn:hover, .mood-btn.active {
    background: rgba(105,219,124,0.18);
    border-color: rgba(105,219,124,0.4);
    color: #69db7c;
  }

  /* 待机呼吸 */
  @keyframes breathe {
    0%, 100% { transform: translateY(0) scaleY(1); }
    50%       { transform: translateY(-3px) scaleY(1.03); }
  }
  /* 高兴跳跳 */
  @keyframes happy-jump {
    0%, 100% { transform: translateY(0); }
    40%       { transform: translateY(-10px) scaleX(1.05); }
    60%       { transform: translateY(-12px) scaleX(0.96); }
  }
  /* 困惑摇头 */
  @keyframes confused-shake {
    0%, 100% { transform: rotate(0deg); }
    25%       { transform: rotate(-5deg); }
    75%       { transform: rotate(5deg); }
  }
  /* 睡觉倾斜 */
  @keyframes sleep-tilt {
    0%, 100% { transform: rotate(-5deg) translateY(0); }
    50%       { transform: rotate(-5deg) translateY(-2px); }
  }
  /* 说话震动 */
  @keyframes talking {
    0%, 100% { transform: translateY(0); }
    25%       { transform: translateY(-2px) scaleX(1.02); }
    75%       { transform: translateY(1px) scaleX(0.98); }
  }
  /* 眩晕摇晃 */
  @keyframes dizzy-sway {
    0%, 100% { transform: rotate(-4deg); }
    50%       { transform: rotate(4deg); }
  }
  /* 触角弹动 */
  @keyframes antenna-wiggle {
    0%, 100% { transform: rotate(0deg); }
    25%       { transform: rotate(10deg); }
    75%       { transform: rotate(-10deg); }
  }
  /* 眨眼 */
  @keyframes blink {
    0%, 88%, 100% { transform: scaleY(1); }
    94%            { transform: scaleY(0.08); }
  }
  /* 眼睛发光 */
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1; }
  }
  /* 身体蠕动 */
  @keyframes wriggle {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    33%       { transform: scaleX(1.04) scaleY(0.97); }
    66%       { transform: scaleX(0.97) scaleY(1.03); }
  }
  /* 眩晕螺旋 */
  @keyframes spiral-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .body-group { animation: breathe 2.8s ease-in-out infinite; transform-origin: center bottom; }
  .mood-happy  .body-group { animation: happy-jump 0.55s ease-in-out infinite !important; }
  .mood-confused .body-group { animation: confused-shake 0.5s ease-in-out infinite !important; }
  .mood-sleep  .body-group { animation: sleep-tilt 2.5s ease-in-out infinite !important; }
  .mood-talking .body-group { animation: talking 0.3s ease-in-out infinite !important; }
  .mood-dizzy  .body-group { animation: dizzy-sway 0.5s ease-in-out infinite !important; transform-origin: 70px 50px; }

  .antenna-l { transform-origin: 52px 14px; }
  .antenna-r { transform-origin: 88px 14px; }
  .pet-wrap:hover .antenna-l { animation: antenna-wiggle 0.4s ease-in-out infinite; }
  .pet-wrap:hover .antenna-r { animation: antenna-wiggle 0.4s ease-in-out infinite 0.12s; }

  .eye-l { transform-origin: 52px 38px; animation: blink 3.5s ease-in-out infinite; }
  .eye-r { transform-origin: 88px 38px; animation: blink 3.5s ease-in-out infinite 0.1s; }

  .seg-1 { animation: wriggle 1.8s ease-in-out infinite 0s; transform-origin: 38px 55px; }
  .seg-2 { animation: wriggle 1.8s ease-in-out infinite 0.2s; transform-origin: 62px 58px; }
  .seg-3 { animation: wriggle 1.8s ease-in-out infinite 0.4s; transform-origin: 86px 58px; }
  .seg-4 { animation: wriggle 1.8s ease-in-out infinite 0.6s; transform-origin: 108px 55px; }

  .dizzy-eye-l { transform-origin: 52px 38px; animation: spiral-spin 1.2s linear infinite; }
  .dizzy-eye-r { transform-origin: 88px 38px; animation: spiral-spin 1.2s linear infinite reverse; }
</style>
</head>
<body>

<div class="stage">
  <div class="label">毛毛虫 · 交互预览</div>
  <div class="pet-wrap" id="mainPet">
    <svg id="catSvg" width="140" height="100" viewBox="0 0 140 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 头部渐变 -->
        <radialGradient id="headGrad" cx="45%" cy="35%" r="55%">
          <stop offset="0%"   stop-color="#b2f2bb"/>
          <stop offset="55%"  stop-color="#69db7c"/>
          <stop offset="100%" stop-color="#2f9e44"/>
        </radialGradient>
        <!-- 身体节段渐变 -->
        <radialGradient id="segGrad" cx="40%" cy="30%" r="60%">
          <stop offset="0%"   stop-color="#a9e34b"/>
          <stop offset="60%"  stop-color="#74c417"/>
          <stop offset="100%" stop-color="#4c9a0a"/>
        </radialGradient>
        <!-- 眼睛发光 -->
        <radialGradient id="eyeGlowL" cx="52" cy="38" r="12" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#c0ff72" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#69db7c" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="eyeGlowR" cx="88" cy="38" r="12" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#c0ff72" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#69db7c" stop-opacity="0"/>
        </radialGradient>
        <!-- 高光 -->
        <radialGradient id="shineGrad" cx="35%" cy="25%" r="50%">
          <stop offset="0%"   stop-color="white" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <!-- 阴影 -->
        <filter id="dropShadow">
          <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
        </filter>
        <filter id="glowFilter">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <g class="body-group" filter="url(#dropShadow)">

        <!-- 触角 -->
        <g class="antenna-l">
          <line x1="52" y1="18" x2="42" y2="5" stroke="#52b788" stroke-width="2" stroke-linecap="round"/>
          <circle cx="42" cy="4" r="3.5" fill="#c0ff72" filter="url(#glowFilter)"/>
          <circle cx="42" cy="4" r="2" fill="white"/>
        </g>
        <g class="antenna-r">
          <line x1="88" y1="18" x2="98" y2="5" stroke="#52b788" stroke-width="2" stroke-linecap="round"/>
          <circle cx="98" cy="4" r="3.5" fill="#c0ff72" filter="url(#glowFilter)"/>
          <circle cx="98" cy="4" r="2" fill="white"/>
        </g>

        <!-- 头部 -->
        <circle cx="70" cy="36" r="28" fill="url(#headGrad)"/>
        <circle cx="70" cy="36" r="28" fill="url(#shineGrad)"/>
        <!-- 脸颊腮红 -->
        <ellipse cx="48" cy="46" rx="7" ry="4" fill="#ff8fab" opacity="0.35"/>
        <ellipse cx="92" cy="46" rx="7" ry="4" fill="#ff8fab" opacity="0.35"/>

        <!-- 眼睛左 -->
        <g class="eye-l">
          <circle cx="52" cy="38" r="10" fill="url(#eyeGlowL)" opacity="0.7"/>
          <circle cx="52" cy="38" r="8"  fill="white"/>
          <circle cx="52" cy="38" r="5.5" fill="#1a7a2e"/>
          <circle cx="52" cy="38" r="3.5" fill="#0d4a1a"/>
          <circle cx="54" cy="36" r="1.5" fill="white" opacity="0.9"/>
        </g>
        <!-- 眼睛右 -->
        <g class="eye-r">
          <circle cx="88" cy="38" r="10" fill="url(#eyeGlowR)" opacity="0.7"/>
          <circle cx="88" cy="38" r="8"  fill="white"/>
          <circle cx="88" cy="38" r="5.5" fill="#1a7a2e"/>
          <circle cx="88" cy="38" r="3.5" fill="#0d4a1a"/>
          <circle cx="90" cy="36" r="1.5" fill="white" opacity="0.9"/>
        </g>

        <!-- 嘴巴 -->
        <path id="mouthPath" d="M 60 50 Q 70 57 80 50" stroke="#2f9e44" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>

        <!-- 身体节段（从右到左，越来越小） -->
        <g class="seg-4">
          <circle cx="108" cy="62" r="14" fill="url(#segGrad)"/>
          <circle cx="108" cy="62" r="14" fill="url(#shineGrad)"/>
        </g>
        <g class="seg-3">
          <circle cx="86" cy="65" r="16" fill="url(#segGrad)"/>
          <circle cx="86" cy="65" r="16" fill="url(#shineGrad)"/>
        </g>
        <g class="seg-2">
          <circle cx="62" cy="66" r="17" fill="url(#segGrad)"/>
          <circle cx="62" cy="66" r="17" fill="url(#shineGrad)"/>
        </g>
        <!-- 尾巴小节 -->
        <circle cx="124" cy="60" r="9" fill="url(#segGrad)"/>
        <circle cx="133" cy="57" r="5.5" fill="url(#segGrad)"/>
        <!-- 节段连接线 -->
        <line x1="48" y1="60" x2="70" y2="62" stroke="#52b788" stroke-width="1.5" opacity="0.4"/>
        <line x1="74" y1="63" x2="94" y2="62" stroke="#52b788" stroke-width="1.5" opacity="0.4"/>
        <line x1="98" y1="61" x2="116" y2="60" stroke="#52b788" stroke-width="1.5" opacity="0.4"/>

        <!-- 腿（小短腿） -->
        <ellipse cx="56"  cy="80" rx="5" ry="3.5" fill="#2f9e44" opacity="0.8"/>
        <ellipse cx="70"  cy="82" rx="5" ry="3.5" fill="#2f9e44" opacity="0.8"/>
        <ellipse cx="84"  cy="81" rx="5" ry="3.5" fill="#2f9e44" opacity="0.8"/>
        <ellipse cx="98"  cy="79" rx="5" ry="3.5" fill="#2f9e44" opacity="0.8"/>
        <ellipse cx="112" cy="76" rx="4" ry="3"   fill="#2f9e44" opacity="0.8"/>

      </g>

      <!-- 地面阴影 -->
      <ellipse cx="80" cy="90" rx="45" ry="5" fill="rgba(0,0,0,0.18)"/>
    </svg>
  </div>

  <div class="mood-btns">
    <button class="mood-btn active" onclick="setMood('idle',this)">😐 待机</button>
    <button class="mood-btn" onclick="setMood('happy',this)">😄 高兴</button>
    <button class="mood-btn" onclick="setMood('confused',this)">😕 困惑</button>
    <button class="mood-btn" onclick="setMood('sleep',this)">😴 睡觉</button>
    <button class="mood-btn" onclick="setMood('talking',this)">💬 说话</button>
    <button class="mood-btn" onclick="setMood('dizzy',this)">😵 眩晕</button>
  </div>
</div>

<script>
  const pet = document.getElementById('mainPet');

  const eyeTemplates = {
    idle: (cx, cy, side) => `
      <circle cx="${cx}" cy="${cy}" r="10" fill="url(#eyeGlow${side})" opacity="0.7"/>
      <circle cx="${cx}" cy="${cy}" r="8" fill="white"/>
      <circle cx="${cx}" cy="${cy}" r="5.5" fill="#1a7a2e"/>
      <circle cx="${cx}" cy="${cy}" r="3.5" fill="#0d4a1a"/>
      <circle cx="${cx+2}" cy="${cy-2}" r="1.5" fill="white" opacity="0.9"/>`,

    happy: (cx, cy, side) => `
      <circle cx="${cx}" cy="${cy}" r="10" fill="url(#eyeGlow${side})" opacity="0.8"/>
      <path d="M ${cx-7} ${cy+1} Q ${cx} ${cy-8} ${cx+7} ${cy+1}" fill="#2f9e44" stroke="#69db7c" stroke-width="1"/>
      <path d="M ${cx-5} ${cy} Q ${cx} ${cy-5} ${cx+5} ${cy}" fill="#52b788"/>
      <circle cx="${cx+2}" cy="${cy-2}" r="1.2" fill="white" opacity="0.9"/>`,

    confused: (cx, cy, side) => side === 'L' ? `
      <circle cx="${cx}" cy="${cy}" r="9" fill="url(#eyeGlow${side})" opacity="0.7"/>
      <circle cx="${cx}" cy="${cy}" r="7.5" fill="white"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="#1a7a2e"/>
      <circle cx="${cx}" cy="${cy}" r="3" fill="#0d4a1a"/>
      <circle cx="${cx+1.5}" cy="${cy-1.5}" r="1.2" fill="white" opacity="0.9"/>` : `
      <circle cx="${cx}" cy="${cy}" r="9" fill="url(#eyeGlow${side})" opacity="0.7"/>
      <ellipse cx="${cx}" cy="${cy}" rx="7.5" ry="3.5" fill="white"/>
      <ellipse cx="${cx}" cy="${cy}" rx="5" ry="2.2" fill="#1a7a2e"/>
      <path d="M ${cx-7} ${cy-3.5} Q ${cx} ${cy-7} ${cx+7} ${cy-3.5}" fill="none" stroke="#2f9e44" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="${cx+1.5}" cy="${cy-0.5}" r="1" fill="white" opacity="0.8"/>`,

    sleep: (cx, cy) => `
      <ellipse cx="${cx}" cy="${cy+1}" rx="7" ry="2" fill="#52b788" opacity="0.5"/>
      <path d="M ${cx-7} ${cy+1} Q ${cx} ${cy-4} ${cx+7} ${cy+1}" fill="#69db7c" opacity="0.7"/>
      <path d="M ${cx-6} ${cy+1} L ${cx+6} ${cy+1}" stroke="#2f9e44" stroke-width="2.5" stroke-linecap="round"/>`,

    talking: (cx, cy, side) => `
      <circle cx="${cx}" cy="${cy}" r="11" fill="url(#eyeGlow${side})" opacity="0.9"/>
      <circle cx="${cx}" cy="${cy}" r="8.5" fill="white"/>
      <circle cx="${cx}" cy="${cy}" r="6" fill="#1a7a2e"/>
      <circle cx="${cx}" cy="${cy}" r="4" fill="#0d4a1a"/>
      <circle cx="${cx+2}" cy="${cy-2}" r="1.5" fill="white" opacity="0.9"/>`,

    dizzy: (cx, cy, side) => {
      const cls = side === 'L' ? 'dizzy-eye-l' : 'dizzy-eye-r';
      return `
      <circle cx="${cx}" cy="${cy}" r="8" fill="#0d2a14" opacity="0.8"/>
      <g class="${cls}">
        <circle cx="${cx}" cy="${cy}" r="7.5" fill="none" stroke="#52b788" stroke-width="1" opacity="0.4"/>
        <path d="M ${cx} ${cy} m 0 -6 a 6 6 0 0 1 6 6 a 4.2 4.2 0 0 1 -4.2 4.2 a 2.6 2.6 0 0 1 -2.6 -2.6 a 1.3 1.3 0 0 1 1.3 -1.3"
          fill="none" stroke="#a9e34b" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="${cx}" cy="${cy}" r="1.5" fill="#c0ff72"/>
      </g>`;
    }
  };

  function setEyes(mood) {
    const eyeL = pet.querySelector('.eye-l');
    const eyeR = pet.querySelector('.eye-r');
    const fn = eyeTemplates[mood] || eyeTemplates.idle;
    eyeL.innerHTML = fn(52, 38, 'L');
    eyeR.innerHTML = fn(88, 38, 'R');
    const blinkMoods = ['idle', 'hungry'];
    eyeL.style.animation = blinkMoods.includes(mood) ? '' : 'none';
    eyeR.style.animation = blinkMoods.includes(mood) ? '' : 'none';
    if (mood === 'talking') {
      eyeL.style.animation = 'glow-pulse 0.4s ease-in-out infinite';
      eyeR.style.animation = 'glow-pulse 0.4s ease-in-out infinite 0.1s';
    }
  }

  function setMood(mood, btn) {
    pet.className = 'pet-wrap';
    if (mood !== 'idle') pet.classList.add('mood-' + mood);
    const mouth = pet.querySelector('#mouthPath');
    const mouthPaths = {
      idle:     'M 60 50 Q 70 57 80 50',
      happy:    'M 56 48 Q 70 60 84 48',
      confused: 'M 60 52 Q 70 50 80 54',
      sleep:    'M 62 51 Q 70 49 78 51',
      talking:  'M 62 50 Q 70 54 78 50',
      dizzy:    'M 60 52 Q 70 56 80 52',
    };
    mouth.setAttribute('d', mouthPaths[mood] || mouthPaths.idle);
    setEyes(mood);
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  setInterval(() => {
    if (!pet.className.includes('mood-')) {
      ['eye-l','eye-r'].forEach(cls => {
        const el = pet.querySelector('.' + cls);
        el.style.animation = 'none';
        setTimeout(() => el.style.animation = '', 50);
      });
    }
  }, 4500);
</script>
</body>
</html>
