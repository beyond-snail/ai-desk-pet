<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>机器人形象预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'PingFang SC', sans-serif;
    gap: 60px;
    flex-wrap: wrap;
    padding: 40px;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .label {
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── 机器人容器 ── */
  .robot-wrap {
    position: relative;
    width: 120px;
    height: 160px;
    cursor: pointer;
  }

  .robot-wrap:hover .robot-body-group {
    animation: walk-bob 0.45s ease-in-out infinite alternate;
  }

  /* 走路：身体上下起伏 + 轻微左右 */
  @keyframes walk-bob {
    from { transform: translateY(0) rotate(-1deg); }
    to   { transform: translateY(-5px) rotate(1deg); }
  }

  /* 待机呼吸 */
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-3px); }
  }

  .robot-body-group {
    animation: breathe 3s ease-in-out infinite;
    transform-origin: center bottom;
  }

  /* 天线弹动 */
  @keyframes antenna-wiggle {
    0%, 100% { transform: rotate(0deg); }
    25%       { transform: rotate(8deg); }
    75%       { transform: rotate(-8deg); }
  }

  .antenna-l { transform-origin: 44px 28px; }
  .antenna-r { transform-origin: 76px 28px; }

  .robot-wrap:hover .antenna-l { animation: antenna-wiggle 0.4s ease-in-out infinite; }
  .robot-wrap:hover .antenna-r { animation: antenna-wiggle 0.4s ease-in-out infinite 0.1s; }

  /* 眼睛眨眼 */
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95%            { transform: scaleY(0.08); }
  }

  .eye-l { transform-origin: 43px 62px; animation: blink 4s ease-in-out infinite; }
  .eye-r { transform-origin: 77px 62px; animation: blink 4s ease-in-out infinite 0.08s; }

  /* 眼睛发光脉冲 */
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; r: 7px; }
    50%       { opacity: 1;   r: 9px; }
  }

  .eye-glow-l { animation: glow-pulse 2s ease-in-out infinite; }
  .eye-glow-r { animation: glow-pulse 2s ease-in-out infinite 0.3s; }

  /* 眩晕螺旋旋转 */
  @keyframes spiral-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .dizzy-eye-l { transform-origin: 43px 62px; animation: spiral-spin 1.2s linear infinite; }
  .dizzy-eye-r { transform-origin: 77px 62px; animation: spiral-spin 1.2s linear infinite reverse; }

  /* 彩虹条纹流动 */
  @keyframes stripe-flow {
    from { transform: translateX(0); }
    to   { transform: translateX(-20px); }
  }

  .stripe-pattern { animation: stripe-flow 2s linear infinite; }

  /* 腿部走路 — 交替摆动，左右反相 */
  @keyframes leg-l {
    0%   { transform: rotate(-18deg); }
    100% { transform: rotate(18deg); }
  }
  @keyframes leg-r {
    0%   { transform: rotate(18deg); }
    100% { transform: rotate(-18deg); }
  }

  /* 手臂走路 — 与腿反向 */
  @keyframes arm-l {
    0%   { transform: rotate(14deg); }
    100% { transform: rotate(-14deg); }
  }
  @keyframes arm-r {
    0%   { transform: rotate(-14deg); }
    100% { transform: rotate(14deg); }
  }

  .arm-l-group { transform-origin: 26px 100px; }
  .arm-r-group { transform-origin: 94px 100px; }

  .leg-l-group { transform-origin: 46px 128px; }
  .leg-r-group { transform-origin: 74px 128px; }

  .robot-wrap:hover .leg-l-group { animation: leg-l 0.45s ease-in-out infinite alternate; }
  .robot-wrap:hover .leg-r-group { animation: leg-r 0.45s ease-in-out infinite alternate; }
  .robot-wrap:hover .arm-l-group { animation: arm-l 0.45s ease-in-out infinite alternate; }
  .robot-wrap:hover .arm-r-group { animation: arm-r 0.45s ease-in-out infinite alternate; }

  /* 情绪状态切换按钮 */
  .mood-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 320px;
  }

  .mood-btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mood-btn:hover, .mood-btn.active {
    background: rgba(100, 200, 255, 0.18);
    border-color: rgba(100, 200, 255, 0.4);
    color: #7dd3fc;
  }

  /* 情绪动画 */

  /* 高兴：跳跳 */
  @keyframes happy-jump {
    0%, 100% { transform: translateY(0) scale(1); }
    40%       { transform: translateY(-12px) scale(1.05, 0.95); }
    60%       { transform: translateY(-14px) scale(0.95, 1.05); }
  }

  .mood-happy .robot-body-group {
    animation: happy-jump 0.6s ease-in-out infinite !important;
  }

  /* 困惑：左右摇头 */
  @keyframes confused-shake {
    0%, 100% { transform: rotate(0deg); }
    25%       { transform: rotate(-6deg); }
    75%       { transform: rotate(6deg); }
  }

  .mood-confused .robot-body-group {
    animation: confused-shake 0.5s ease-in-out infinite !important;
  }

  /* 睡觉：慢呼吸 + 倾斜 */
  @keyframes sleep-tilt {
    0%, 100% { transform: rotate(-4deg) translateY(0); }
    50%       { transform: rotate(-4deg) translateY(-2px); }
  }

  .mood-sleep .robot-body-group {
    animation: sleep-tilt 2.5s ease-in-out infinite !important;
  }

  /* 说话：轻微震动 */
  @keyframes talking {
    0%, 100% { transform: translateY(0); }
    25%       { transform: translateY(-2px) scaleX(1.02); }
    75%       { transform: translateY(1px) scaleX(0.98); }
  }

  .mood-talking .robot-body-group {
    animation: talking 0.3s ease-in-out infinite !important;
  }

  /* 眩晕：轻微摇晃（不旋转身体） */
  @keyframes dizzy-sway {
    0%, 100% { transform: rotate(-3deg) translateY(0); }
    50%       { transform: rotate(3deg) translateY(-2px); }
  }

  .mood-dizzy .robot-body-group {
    animation: dizzy-sway 0.6s ease-in-out infinite !important;
    transform-origin: 60px 80px;
  }

  /* 尺寸对比展示 */
  .size-demo {
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }

  .size-label {
    color: rgba(255,255,255,0.3);
    font-size: 10px;
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- 主展示 -->
<div class="stage">
  <div class="label">交互预览（悬停走路）</div>
  <div class="robot-wrap" id="mainRobot">
    <svg id="robotSvg" width="120" height="160" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 头部：球形渐变，光源左上角，模拟圆球 -->
        <radialGradient id="headGrad" cx="35%" cy="28%" r="65%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#eaf6ff"/>
          <stop offset="30%"  stop-color="#b8d8ec"/>
          <stop offset="70%"  stop-color="#7aaec8"/>
          <stop offset="100%" stop-color="#3d7a9a"/>
        </radialGradient>
        <!-- 头部右侧暗面（叠加） -->
        <linearGradient id="headShadow" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
          <stop offset="60%"  stop-color="rgba(0,0,0,0)"/>
          <stop offset="100%" stop-color="rgba(0,20,40,0.28)"/>
        </linearGradient>
        <!-- 头部底部暗面 -->
        <linearGradient id="headBottomShadow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
          <stop offset="55%"  stop-color="rgba(0,0,0,0)"/>
          <stop offset="100%" stop-color="rgba(0,20,40,0.32)"/>
        </linearGradient>

        <!-- 身体：球形渐变 -->
        <radialGradient id="bodyGrad" cx="38%" cy="25%" r="70%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#daeef8"/>
          <stop offset="40%"  stop-color="#9ec8de"/>
          <stop offset="100%" stop-color="#4e8aaa"/>
        </radialGradient>
        <linearGradient id="bodyShadow" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
          <stop offset="65%"  stop-color="rgba(0,0,0,0)"/>
          <stop offset="100%" stop-color="rgba(0,20,40,0.3)"/>
        </linearGradient>

        <!-- 四肢：圆柱渐变（左亮右暗） -->
        <linearGradient id="limbGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#c8e0ee"/>
          <stop offset="35%"  stop-color="#a0c4d8"/>
          <stop offset="70%"  stop-color="#6a9ab8"/>
          <stop offset="100%" stop-color="#3d6a88"/>
        </linearGradient>
        <!-- 腿部圆柱渐变 -->
        <linearGradient id="legGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#b8d4e8"/>
          <stop offset="30%"  stop-color="#90b8d0"/>
          <stop offset="75%"  stop-color="#5888a8"/>
          <stop offset="100%" stop-color="#2e5878"/>
        </linearGradient>

        <!-- 眼睛发光 -->
        <radialGradient id="eyeGlowL" cx="43" cy="62" r="14" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#a0f0ff" stop-opacity="1"/>
          <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="eyeGlowR" cx="77" cy="62" r="14" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#a0f0ff" stop-opacity="1"/>
          <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
        </radialGradient>

        <!-- 面罩渐变：深色玻璃感 -->
        <linearGradient id="visorGrad" x1="28" y1="48" x2="92" y2="84" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#071220"/>
          <stop offset="100%" stop-color="#0a1e38"/>
        </linearGradient>
        <!-- 面罩玻璃反光 -->
        <linearGradient id="visorShine" x1="0" y1="0" x2="0.6" y2="1" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
          <stop offset="40%"  stop-color="rgba(255,255,255,0.04)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>

        <!-- 彩虹条纹 -->
        <pattern id="rainbowStripe" x="0" y="0" width="20" height="8" patternUnits="userSpaceOnUse">
          <rect x="0" y="0"   width="20" height="2"   fill="#ff6b6b" opacity="0.95"/>
          <rect x="0" y="2"   width="20" height="1.5" fill="#ffa94d" opacity="0.95"/>
          <rect x="0" y="3.5" width="20" height="1.5" fill="#ffd43b" opacity="0.95"/>
          <rect x="0" y="5"   width="20" height="1.5" fill="#69db7c" opacity="0.95"/>
          <rect x="0" y="6.5" width="20" height="1.5" fill="#74c0fc" opacity="0.95"/>
        </pattern>

        <!-- 顶部高光（椭圆形，模拟球面高光） -->
        <radialGradient id="topShine" cx="40%" cy="20%" r="55%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
          <stop offset="50%"  stop-color="white" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>

        <!-- 阴影滤镜 -->
        <filter id="dropShadow" x="-25%" y="-20%" width="150%" height="150%">
          <feDropShadow dx="2" dy="6" stdDeviation="5" flood-color="#001828" flood-opacity="0.5"/>
        </filter>
        <filter id="glowFilter">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
          <feOffset dx="1" dy="2"/>
          <feComposite in2="SourceGraphic" operator="arithmetic" k2="-1" k3="1"/>
        </filter>

        <!-- 裁剪 -->
        <clipPath id="visorClip">
          <rect x="28" y="48" width="64" height="36" rx="10"/>
        </clipPath>
        <clipPath id="bodyClip">
          <rect x="32" y="88" width="56" height="40" rx="10"/>
        </clipPath>
        <clipPath id="headClip">
          <rect x="22" y="26" width="76" height="62" rx="22"/>
        </clipPath>
      </defs>

      <g class="robot-body-group" filter="url(#dropShadow)">

        <!-- ── 天线 ── -->
        <g class="antenna-l">
          <line x1="44" y1="28" x2="36" y2="14" stroke="#8ab4c8" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="36" cy="12" r="4" fill="#7ee8ff" opacity="0.9" filter="url(#glowFilter)"/>
          <circle cx="36" cy="12" r="2.5" fill="white"/>
        </g>
        <g class="antenna-r">
          <line x1="76" y1="28" x2="84" y2="14" stroke="#8ab4c8" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="84" cy="12" r="4" fill="#7ee8ff" opacity="0.9" filter="url(#glowFilter)"/>
          <circle cx="84" cy="12" r="2.5" fill="white"/>
        </g>

        <!-- ── 头部 ── -->
        <!-- 头部主体：球形渐变 -->
        <rect x="22" y="26" width="76" height="62" rx="22" fill="url(#headGrad)"/>
        <!-- 右侧暗面 -->
        <rect x="22" y="26" width="76" height="62" rx="22" fill="url(#headShadow)"/>
        <!-- 底部暗面 -->
        <rect x="22" y="26" width="76" height="62" rx="22" fill="url(#headBottomShadow)"/>
        <!-- 顶部球面高光 -->
        <rect x="22" y="26" width="76" height="62" rx="22" fill="url(#topShine)"/>
        <!-- 左侧边缘暗线（增加厚度感） -->
        <rect x="22" y="30" width="5" height="54" rx="3" fill="rgba(0,15,30,0.18)"/>
        <!-- 右侧边缘暗线 -->
        <rect x="93" y="30" width="5" height="54" rx="3" fill="rgba(0,15,30,0.28)"/>

        <!-- 面罩 -->
        <rect x="28" y="48" width="64" height="36" rx="10" fill="url(#visorGrad)"/>
        <!-- 面罩玻璃反光 -->
        <rect x="28" y="48" width="64" height="36" rx="10" fill="url(#visorShine)"/>
        <!-- 面罩顶部高光条 -->
        <rect x="32" y="50" width="24" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
        <!-- 面罩底部反光 -->
        <rect x="30" y="76" width="60" height="6" rx="3" fill="rgba(14,165,233,0.08)"/>

        <!-- 眼睛左 -->
        <g class="eye-l">
          <circle class="eye-glow-l" cx="43" cy="62" r="11" fill="url(#eyeGlowL)"/>
          <circle cx="43" cy="62" r="9"   fill="#0ea5e9" opacity="0.2"/>
          <circle cx="43" cy="62" r="7.5" fill="#38bdf8"/>
          <circle cx="43" cy="62" r="5"   fill="#7ee8ff"/>
          <circle cx="43" cy="62" r="2.8" fill="white" opacity="0.95"/>
          <circle cx="46" cy="59" r="1.3" fill="white" opacity="0.85"/>
        </g>

        <!-- 眼睛右 -->
        <g class="eye-r">
          <circle class="eye-glow-r" cx="77" cy="62" r="11" fill="url(#eyeGlowR)"/>
          <circle cx="77" cy="62" r="9"   fill="#0ea5e9" opacity="0.2"/>
          <circle cx="77" cy="62" r="7.5" fill="#38bdf8"/>
          <circle cx="77" cy="62" r="5"   fill="#7ee8ff"/>
          <circle cx="77" cy="62" r="2.8" fill="white" opacity="0.95"/>
          <circle cx="80" cy="59" r="1.3" fill="white" opacity="0.85"/>
        </g>

        <!-- 嘴巴（默认微笑） -->
        <g id="mouthGroup">
          <path id="mouthPath" d="M 46 74 Q 60 80 74 74" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
        </g>

        <!-- 耳朵/侧面装饰 -->
        <rect x="16" y="52" width="8" height="16" rx="4" fill="#8ab4c8"/>
        <rect x="96" y="52" width="8" height="16" rx="4" fill="#8ab4c8"/>
        <rect x="17" y="56" width="6" height="8" rx="3" fill="#5a8aa0"/>

        <!-- ── 颈部 ── -->
        <rect x="50" y="87" width="20" height="8" rx="4" fill="#7aa0b8"/>
        <rect x="52" y="88" width="16" height="6" rx="3" fill="#6090a8"/>

        <!-- ── 身体 ── -->
        <rect x="32" y="92" width="56" height="40" rx="10" fill="url(#bodyGrad)"/>
        <!-- 身体右侧暗面 -->
        <rect x="32" y="92" width="56" height="40" rx="10" fill="url(#bodyShadow)"/>
        <!-- 身体顶部高光 -->
        <rect x="32" y="92" width="56" height="40" rx="10" fill="url(#topShine)"/>
        <!-- 身体左边缘暗线 -->
        <rect x="32" y="96" width="4" height="32" rx="2" fill="rgba(0,15,30,0.15)"/>
        <!-- 身体右边缘暗线 -->
        <rect x="84" y="96" width="4" height="32" rx="2" fill="rgba(0,15,30,0.25)"/>

        <!-- 彩虹条纹 -->
        <g clip-path="url(#bodyClip)">
          <g class="stripe-pattern">
            <rect x="22" y="100" width="96" height="22" fill="url(#rainbowStripe)"/>
          </g>
        </g>
        <!-- 条纹右侧暗面遮罩（让条纹也有立体感） -->
        <rect x="72" y="100" width="16" height="22" fill="rgba(0,15,30,0.18)"/>

        <!-- 胸口小灯 -->
        <circle cx="60" cy="124" r="5" fill="#0ea5e9" opacity="0.9" filter="url(#glowFilter)"/>
        <circle cx="60" cy="124" r="3.5" fill="#7ee8ff"/>
        <circle cx="59" cy="123" r="1.2" fill="white" opacity="0.8"/>

        <!-- ── 手臂 ── -->
        <!-- 左臂 -->
        <g class="arm-l-group">
          <rect x="18" y="94" width="16" height="28" rx="8" fill="url(#limbGrad)"/>
          <rect x="18" y="94" width="16" height="12" rx="8" fill="rgba(255,255,255,0.15)"/>
          <circle cx="26" cy="126" r="7" fill="#8ab4c8"/>
          <circle cx="26" cy="126" r="5" fill="#7aa0b8"/>
        </g>

        <!-- 右臂 -->
        <g class="arm-r-group">
          <rect x="86" y="94" width="16" height="28" rx="8" fill="url(#limbGrad)"/>
          <rect x="86" y="94" width="16" height="12" rx="8" fill="rgba(255,255,255,0.15)"/>
          <circle cx="94" cy="126" r="7" fill="#8ab4c8"/>
          <circle cx="94" cy="126" r="5" fill="#7aa0b8"/>
        </g>

        <!-- ── 腿部 ── -->
        <g class="leg-l-group">
          <rect x="38" y="130" width="18" height="22" rx="9" fill="url(#limbGrad)"/>
          <!-- 左脚 -->
          <rect x="34" y="148" width="24" height="12" rx="6" fill="#6888a0"/>
          <!-- 鞋子彩虹 -->
          <rect x="34" y="152" width="24" height="4" rx="2" fill="url(#rainbowStripe)"/>
        </g>

        <g class="leg-r-group">
          <rect x="64" y="130" width="18" height="22" rx="9" fill="url(#limbGrad)"/>
          <!-- 右脚 -->
          <rect x="62" y="148" width="24" height="12" rx="6" fill="#6888a0"/>
          <rect x="62" y="152" width="24" height="4" rx="2" fill="url(#rainbowStripe)"/>
        </g>

      </g>

      <!-- 地面阴影 -->
      <ellipse cx="60" cy="162" rx="32" ry="5" fill="rgba(0,0,0,0.2)"/>
    </svg>
  </div>

  <!-- 情绪切换 -->
  <div class="mood-btns">
    <button class="mood-btn active" onclick="setMood('idle', this)">😐 待机</button>
    <button class="mood-btn" onclick="setMood('happy', this)">😄 高兴</button>
    <button class="mood-btn" onclick="setMood('confused', this)">😕 困惑</button>
    <button class="mood-btn" onclick="setMood('sleep', this)">😴 睡觉</button>
    <button class="mood-btn" onclick="setMood('talking', this)">💬 说话</button>
    <button class="mood-btn" onclick="setMood('dizzy', this)">😵 眩晕</button>
  </div>
</div>

<!-- 尺寸对比 -->
<div class="stage">
  <div class="label">尺寸对比</div>
  <div class="size-demo">
    <div>
      <svg width="60" height="80" viewBox="0 0 120 160"><use href="#robotSvg"/></svg>
      <div class="size-label">60×80<br>小</div>
    </div>
    <div>
      <svg width="90" height="120" viewBox="0 0 120 160">
        <defs>
          <linearGradient id="hg2" x1="20" y1="20" x2="100" y2="90" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#d4e8f0"/><stop offset="40%" stop-color="#a8c8d8"/><stop offset="100%" stop-color="#6a9ab0"/>
          </linearGradient>
        </defs>
        <use href="#robotSvg"/>
      </svg>
      <div class="size-label">90×120<br>中（推荐）</div>
    </div>
    <div>
      <svg width="120" height="160" viewBox="0 0 120 160"><use href="#robotSvg"/></svg>
      <div class="size-label">120×160<br>大</div>
    </div>
  </div>
</div>

<script>
  const robot = document.getElementById('mainRobot');

  // 眼睛 SVG 模板
  const eyeTemplates = {
    idle: (cx, cy) => `
      <circle class="${cx===43?'eye-glow-l':'eye-glow-r'}" cx="${cx}" cy="${cy}" r="11" fill="url(#${cx===43?'eyeGlowL':'eyeGlowR'})"/>
      <circle cx="${cx}" cy="${cy}" r="9"   fill="#0ea5e9" opacity="0.2"/>
      <circle cx="${cx}" cy="${cy}" r="7.5" fill="#38bdf8"/>
      <circle cx="${cx}" cy="${cy}" r="5"   fill="#7ee8ff"/>
      <circle cx="${cx}" cy="${cy}" r="2.8" fill="white" opacity="0.95"/>
      <circle cx="${cx+3}" cy="${cy-3}" r="1.3" fill="white" opacity="0.85"/>`,

    happy: (cx, cy) => `
      <circle cx="${cx}" cy="${cy}" r="8" fill="url(#${cx===43?'eyeGlowL':'eyeGlowR'})"/>
      <path d="M ${cx-6} ${cy+1} Q ${cx} ${cy-7} ${cx+6} ${cy+1}" fill="#38bdf8" stroke="#7ee8ff" stroke-width="1"/>
      <path d="M ${cx-4} ${cy} Q ${cx} ${cy-4} ${cx+4} ${cy}" fill="#7ee8ff"/>
      <circle cx="${cx+2}" cy="${cy-2}" r="1.2" fill="white" opacity="0.9"/>`,

    confused: (cx, cy) => {
      if (cx === 43) {
        // 左眼：正常但稍小
        return `
          <circle cx="${cx}" cy="${cy}" r="6" fill="url(#eyeGlowL)"/>
          <circle cx="${cx}" cy="${cy}" r="5" fill="#38bdf8"/>
          <circle cx="${cx}" cy="${cy}" r="3" fill="#7ee8ff"/>
          <circle cx="${cx}" cy="${cy}" r="1.5" fill="white" opacity="0.95"/>
          <circle cx="${cx+1.5}" cy="${cy-1.5}" r="0.8" fill="white" opacity="0.8"/>`;
      } else {
        // 右眼：眯起来（半闭）
        return `
          <circle cx="${cx}" cy="${cy}" r="6" fill="url(#eyeGlowR)"/>
          <ellipse cx="${cx}" cy="${cy}" rx="5.5" ry="2.5" fill="#38bdf8"/>
          <ellipse cx="${cx}" cy="${cy}" rx="3.5" ry="1.5" fill="#7ee8ff"/>
          <circle cx="${cx+1.5}" cy="${cy-0.5}" r="0.8" fill="white" opacity="0.8"/>
          <path d="M ${cx-5.5} ${cy-2.5} Q ${cx} ${cy-5} ${cx+5.5} ${cy-2.5}" fill="none" stroke="#8ab4c8" stroke-width="1.5" stroke-linecap="round"/>`;
      }
    },

    sleep: (cx, cy) => `
      <ellipse cx="${cx}" cy="${cy+1}" rx="6" ry="1.8" fill="#5a8aa0" opacity="0.6"/>
      <path d="M ${cx-6} ${cy+1} Q ${cx} ${cy-3} ${cx+6} ${cy+1}" fill="#6090a8" opacity="0.8"/>
      <path d="M ${cx-5} ${cy+1} L ${cx+5} ${cy+1}" stroke="#8ab4c8" stroke-width="2.5" stroke-linecap="round"/>`,

    talking: (cx, cy) => `
      <circle cx="${cx}" cy="${cy}" r="9" fill="url(#${cx===43?'eyeGlowL':'eyeGlowR'})" opacity="0.8"/>
      <circle cx="${cx}" cy="${cy}" r="7" fill="#0ea5e9" opacity="0.2"/>
      <circle cx="${cx}" cy="${cy}" r="6" fill="#38bdf8"/>
      <circle cx="${cx}" cy="${cy}" r="4" fill="#7ee8ff"/>
      <circle cx="${cx}" cy="${cy}" r="2.5" fill="white" opacity="0.95"/>
      <circle cx="${cx+2}" cy="${cy-2}" r="1.2" fill="white" opacity="0.9"/>`,

    dizzy: (cx, cy) => {
      const cls = cx === 43 ? 'dizzy-eye-l' : 'dizzy-eye-r';
      return `
      <circle cx="${cx}" cy="${cy}" r="7" fill="#1a2a38" opacity="0.85"/>
      <g class="${cls}">
        <circle cx="${cx}" cy="${cy}" r="6.5" fill="none" stroke="#8ab4c8" stroke-width="1.2" opacity="0.3"/>
        <path d="M ${cx} ${cy}
          m 0 -5.5
          a 5.5 5.5 0 0 1 5.5 5.5
          a 4 4 0 0 1 -4 4
          a 2.5 2.5 0 0 1 -2.5 -2.5
          a 1.2 1.2 0 0 1 1.2 -1.2"
          fill="none" stroke="#a0c8e0" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="${cx}" cy="${cy}" r="1.5" fill="#c8e4f0"/>
      </g>`;
    },
  };

  function setEyes(mood) {
    const svgNS = 'http://www.w3.org/2000/svg';
    const eyeL = robot.querySelector('.eye-l');
    const eyeR = robot.querySelector('.eye-r');

    const fn = eyeTemplates[mood] || eyeTemplates.idle;

    // 重建左眼内容
    eyeL.innerHTML = fn(43, 62);
    eyeR.innerHTML = fn(77, 62);

    // 恢复 idle 的眨眼动画
    if (mood === 'idle') {
      eyeL.style.animation = '';
      eyeR.style.animation = '';
    } else {
      eyeL.style.animation = 'none';
      eyeR.style.animation = 'none';
    }

    // talking 眼睛脉冲
    if (mood === 'talking') {
      eyeL.style.animation = 'glow-pulse 0.4s ease-in-out infinite';
      eyeR.style.animation = 'glow-pulse 0.4s ease-in-out infinite 0.1s';
    }
  }

  function setMood(mood, btn) {
    robot.className = 'robot-wrap';
    if (mood !== 'idle') robot.classList.add('mood-' + mood);

    const mouth = robot.querySelector('#mouthPath');

    if (mood === 'sleep') {
      mouth.setAttribute('d', 'M 50 76 Q 60 74 70 76');
    } else if (mood === 'happy') {
      mouth.setAttribute('d', 'M 44 74 Q 60 86 76 74');
    } else if (mood === 'confused') {
      mouth.setAttribute('d', 'M 46 78 Q 60 76 74 80');
    } else if (mood === 'dizzy') {
      mouth.setAttribute('d', 'M 48 78 Q 60 82 72 78');
    } else if (mood === 'talking') {
      mouth.setAttribute('d', 'M 48 76 Q 60 80 72 76');
    } else {
      mouth.setAttribute('d', 'M 46 74 Q 60 80 74 74');
    }

    setEyes(mood);

    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // 随机眨眼（仅 idle 状态）
  setInterval(() => {
    if (!robot.className.includes('mood-')) {
      const eyes = document.querySelectorAll('.eye-l, .eye-r');
      eyes.forEach(e => {
        e.style.animation = 'none';
        setTimeout(() => e.style.animation = '', 50);
      });
    }
  }, 5000);
</script>
</body>
</html>
