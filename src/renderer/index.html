<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Desk Pet</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="pet-root"></div>
  <div id="pet-status-bar" class="hidden">
    <span class="status-dot" data-type="hunger" data-level="high" title="饱食度">🍃</span>
    <span class="status-dot" data-type="cleanliness" data-level="high" title="清洁度">✨</span>
    <span class="status-dot" data-type="affection" data-level="high" title="亲密度">💛</span>
  </div>
  <div id="chat-bubble" class="chat-bubble hidden">
    <div class="content"></div>
  </div>
  <div id="input-panel" class="input-panel hidden">
    <button id="voice-input-button" type="button" aria-label="语音输入" title="开始语音输入">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 15.2a3.2 3.2 0 0 0 3.2-3.2V7.2a3.2 3.2 0 1 0-6.4 0V12a3.2 3.2 0 0 0 3.2 3.2Zm5.6-3.6a.9.9 0 0 0-1.8 0 3.8 3.8 0 0 1-7.6 0 .9.9 0 0 0-1.8 0 5.61 5.61 0 0 0 4.7 5.54V19H8.8a.9.9 0 1 0 0 1.8h6.4a.9.9 0 1 0 0-1.8H13v-1.86a5.61 5.61 0 0 0 4.6-5.54Z"/>
      </svg>
    </button>
    <textarea id="user-input" placeholder="说点什么..." maxlength="200" autocomplete="off" rows="1"></textarea>
    <button id="send-button" type="button" aria-label="发送">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <script src="characters/base-character.js"></script>
  <script src="runtime3d/runtime3d-bootstrap.js"></script>
  <script src="runtime3d/runtime3d-model-profiles.js"></script>
  <script src="characters/rainbow-bot-character.js"></script>
  <script src="characters/character-registry.js"></script>
  <script src="effects/WeatherEffects.js"></script>
  <script src="effects/PetParticles.js"></script>
  <script src="services/WeatherService.js"></script>
  <script src="utils/animation.js"></script>
  <script src="utils/collision.js"></script>
  <script src="utils/pathfinding.js"></script>
  <script src="utils/character-animator.js"></script>
  <script src="components/Caterpillar.js"></script>
  <script src="components/PetController.js"></script>
  <script src="components/ChatBubble.js"></script>
  <script src="components/CareSystem.js"></script>
  <script src="components/GrowthSystem.js"></script>
  <script src="components/ProactiveBehavior.js"></script>
  <script src="components/QuickActions.js"></script>
  <script src="components/IdleBehavior.js"></script>
  <script src="components/VoiceManager.js"></script>
  <script src="components/OnboardingGuide.js"></script>
  <script src="components/Settings.js"></script>
  <script src="components/CharacterPicker.js"></script>
  <script src="components/PetManager.js"></script>
  <script src="components/FocusMode.js"></script>
  <script src="components/PomodoroTimer.js"></script>
  <script src="ai/memory.js"></script>
  <script src="ai/chat.js"></script>
  <script src="ai/commands.js"></script>
  <script>
    window.addEventListener('unhandledrejection', (event) => {
      console.error('Unhandled promise rejection:', event.reason);
      event.preventDefault();
    });

    window.addEventListener('error', (event) => {
      console.error('Uncaught error:', event.error || event.message);
    });

    document.addEventListener('DOMContentLoaded', async function() {
      const petController = new PetController();
      const chatBubble = new ChatBubble();
      const chatManager = new ChatManager();
      const commandManager = new CommandManager();
      const careSystem = new CareSystem();
      const growthSystem = new GrowthSystem();
      const weatherService = new WeatherService();
      const proactiveBehavior = new ProactiveBehavior();
      const quickActions = new QuickActions();
      const idleBehavior = new IdleBehavior();
      const voiceManager = new VoiceManager();
      const particleEffects = new PetParticles();
      const settings = new Settings();
      const characterPicker = new CharacterPicker();
      const petManager = new PetManager();
      const focusMode = new FocusMode();
      const pomodoroTimer = new PomodoroTimer();
      const memoryManager = new InteractionMemory();
      const onboardingGuide = new OnboardingGuide({ chatBubble, petController, quickActions });
      const inputPanel = document.getElementById('input-panel');
      const userInput = document.getElementById('user-input');
      const sendButton = document.getElementById('send-button');
      const voiceInputButton = document.getElementById('voice-input-button');
      const statusBar = document.getElementById('pet-status-bar');
      let singleTapTimer = null;
      let presenceAnimating = false;
      let pendingHideRequest = false;
      let chatMoodResetTimer = null;
      let isPetVisible = true;

      window.growthSystem = growthSystem;
      window.petManager = petManager;

      function getPetElement() {
        return petController.getElement();
      }

      function isPrimaryPetEvent(detail) {
        return detail && detail.instanceId === petController.instanceId;
      }

      function isInputPanelExpanded() {
        return !inputPanel.classList.contains('hidden') && inputPanel.classList.contains('expanded');
      }

      function positionInputPanel() {
        if (!inputPanel || inputPanel.classList.contains('hidden')) {
          return;
        }

        const panelWidth = isInputPanelExpanded() ? Math.min(340, Math.max(220, window.innerWidth - 88)) : 40;
        const panelHeight = isInputPanelExpanded()
          ? Math.max(48, inputPanel.offsetHeight || 48)
          : 40;
        const safeBottom = 18;
        const left = Math.max(12, Math.min(window.innerWidth - panelWidth - 12, (window.innerWidth - panelWidth) / 2));
        const top = Math.max(12, window.innerHeight - panelHeight - safeBottom);

        inputPanel.style.left = `${left}px`;
        inputPanel.style.top = `${top}px`;
      }

      function setStatusBarVisible(visible) {
        if (!statusBar) {
          return;
        }

        statusBar.classList.add('hidden');
      }

      function positionStatusBar() {
        // 状态点位已下线，不再定位
      }

      function updateStatusBar(state) {
        if (!statusBar || !state) {
          return;
        }

        const fields = {
          hunger: state.hunger,
          cleanliness: state.cleanliness,
          affection: state.affection
        };

        Object.entries(fields).forEach(([type, value]) => {
          const dot = statusBar.querySelector(`[data-type="${type}"]`);
          if (!dot) {
            return;
          }

          dot.dataset.level = value < 30 ? 'low' : value < 60 ? 'mid' : 'high';
        });
      }

      function triggerLevelUpEffect(x, y) {
        const emojis = ['⭐', '✨', '🌟', '💫'];
        emojis.forEach((emoji, index) => {
          const element = document.createElement('div');
          element.className = 'levelup-burst';
          element.textContent = emoji;
          element.style.left = `${x + (index - 1.5) * 28}px`;
          element.style.top = `${y - 20}px`;
          element.style.animationDelay = `${index * 80}ms`;
          document.body.appendChild(element);
          element.addEventListener('animationend', () => element.remove());
        });
      }

      function triggerEvolveEffect() {
        const element = document.createElement('div');
        element.className = 'evolve-flash';
        document.body.appendChild(element);
        element.addEventListener('animationend', () => element.remove());
      }

      function showInputPanel() {
        if (!getPetElement()) {
          hideInputPanel();
          return;
        }

        inputPanel.classList.remove('hidden');
        inputPanel.classList.remove('collapsed');
        inputPanel.classList.add('expanded');
        inputPanel.dataset.expanded = 'true';
        positionInputPanel();
        petController.isMoving = false;
        quickActions.showForPet();
        userInput.focus();
      }

      function collapseInputPanel(options = {}) {
        const force = Boolean(options.force);
        if (!force && userInput.value.trim()) {
          return;
        }

        if (!force && voiceManager.isListening) {
          return;
        }

        userInput.value = '';
        hideInputPanel();
      }

      function hideInputPanel() {
        inputPanel.classList.add('hidden');
        inputPanel.classList.remove('expanded');
        inputPanel.classList.remove('collapsed');
        inputPanel.dataset.expanded = 'false';
        userInput.value = '';
        userInput.style.height = 'auto';
        inputPanel.style.left = '-9999px';
        inputPanel.style.top = '-9999px';
        petController.isMoving = false;
        clearTypingReaction();
      }

      function showSettings() {
        hideInputPanel();
        settings.show();
      }

      function setPetInteractionEnabled(enabled) {
        if (typeof petController.setInteractionEnabled === 'function') {
          petController.setInteractionEnabled(enabled);
        }
      }

      function setChatMood(mood, options = {}) {
        if (petController.currentCharacterId !== 'rainbow-bot') {
          return;
        }

        if (chatMoodResetTimer) {
          clearTimeout(chatMoodResetTimer);
          chatMoodResetTimer = null;
        }

        petController.setMood(mood, { silent: true });

        if (options.resetAfterMs) {
          chatMoodResetTimer = window.setTimeout(() => {
            chatMoodResetTimer = null;
            if (petController.currentCharacterId === 'rainbow-bot') {
              petController.setMood('idle', { silent: true });
            }
          }, options.resetAfterMs);
        }
      }

      function clearTypingReaction() {
        const petElement = getPetElement();
        if (petElement) {
          delete petElement.dataset.chatMood;
        }
      }

      function setTypingReactionActive(active) {
        const petElement = getPetElement();
        if (!petElement) {
          return;
        }

        if (active) {
          petElement.dataset.chatMood = 'listening';
        } else {
          delete petElement.dataset.chatMood;
        }
      }

      function getSpawnPoint(edge = 'left') {
        const petElement = getPetElement();
        const width = petElement ? (petElement.offsetWidth || 96) : 96;
        const height = petElement ? (petElement.offsetHeight || 56) : 56;
        const randomY = Math.max(32, Math.round(Math.random() * Math.max(32, window.innerHeight - height - 32)));
        const randomX = Math.max(32, Math.round(Math.random() * Math.max(32, window.innerWidth - width - 32)));

        if (edge === 'right') {
          return { x: window.innerWidth + 16, y: randomY };
        }

        if (edge === 'bottom') {
          return { x: randomX, y: window.innerHeight + 16 };
        }

        return { x: -width - 16, y: randomY };
      }

      function getEntranceTarget() {
        const petElement = getPetElement();
        const width = petElement ? (petElement.offsetWidth || 96) : 96;
        const height = petElement ? (petElement.offsetHeight || 56) : 56;
        const target = {
          x: Math.round(window.innerWidth * 0.15),
          y: Math.round(window.innerHeight * 0.58)
        };

        return {
          x: Math.max(24, Math.min(window.innerWidth - width - 24, target.x)),
          y: Math.max(24, Math.min(window.innerHeight - height - 24, target.y))
        };
      }

      function getExitTarget() {
        const petElement = getPetElement();
        const width = petElement ? (petElement.offsetWidth || 96) : 96;
        const height = petElement ? (petElement.offsetHeight || 56) : 56;
        const current = {
          x: petController.position.x,
          y: petController.position.y
        };

        const candidates = [
          { x: 0, y: current.y },
          { x: Math.max(0, window.innerWidth - width), y: current.y },
          { x: current.x, y: Math.max(0, window.innerHeight - height) }
        ].map((point) => ({
          x: Math.max(0, Math.min(window.innerWidth - width, point.x)),
          y: Math.max(0, Math.min(window.innerHeight - height, point.y))
        }));

        let best = candidates[0];
        let bestDistance = Number.POSITIVE_INFINITY;
        candidates.forEach((candidate) => {
          const dx = candidate.x - current.x;
          const dy = candidate.y - current.y;
          const distance = Math.sqrt(dx ** 2 + dy ** 2);
          if (distance < bestDistance) {
            bestDistance = distance;
            best = candidate;
          }
        });

        return best;
      }

      async function runEntranceAnimation(options = {}) {
        if (!presenceAnimating && isPetVisible) {
          if (options.withVoice) {
            showInputPanel();
            voiceManager.startListening();
          }
          return;
        }

        if (presenceAnimating) {
          return;
        }

        const petElement = getPetElement();
        if (!petElement) {
          return;
        }

        presenceAnimating = true;
        pendingHideRequest = false;
        quickActions.hide();
        hideInputPanel();
        proactiveBehavior.setSuppressed(true);
        setPetInteractionEnabled(false);
        petController.isMoving = true;
        petController.stopMovement();

        const edgePool = ['left', 'right', 'bottom'];
        const edge = options.edge === 'random'
          ? edgePool[Math.floor(Math.random() * edgePool.length)]
          : (options.edge || 'left');
        const keepSuppressed = Boolean(options.keepSuppressed);
        const spawn = getSpawnPoint(edge);
        const target = options.target || getEntranceTarget();

        petElement.style.transition = 'opacity 180ms ease';
        petElement.style.opacity = '0';
        petController.setPosition(spawn.x, spawn.y);

        await new Promise((resolve) => setTimeout(resolve, 40));
        petElement.style.opacity = '1';
        const travelDistance = Math.hypot(target.x - spawn.x, target.y - spawn.y);
        const timeoutMs = Math.max(2200, Math.min(5200, Math.round(travelDistance * 12)));
        const arrived = await petController.moveToTargetAndWait(target, { timeoutMs, arrivalThreshold: 16 });
        if (!arrived) {
          // 入场超时时强制落位，避免宠物停在屏幕外导致面板漂到左上角
          petController.setPosition(target.x, target.y);
        }

        petElement.style.transition = '';
        petController.isMoving = false;
        petController.startContinuousMovement();
        setPetInteractionEnabled(true);
        setStatusBarVisible(false);
        isPetVisible = true;
        if (!keepSuppressed) {
          proactiveBehavior.setSuppressed(false);
        }
        presenceAnimating = false;

        if (pendingHideRequest) {
          pendingHideRequest = false;
          await runExitAnimation();
          return;
        }

        if (options.withVoice) {
          showInputPanel();
          voiceManager.startListening();
        } else {
          hideInputPanel();
        }
      }

      async function runExitAnimation() {
        if (!presenceAnimating && !isPetVisible) {
          if (window.electronAPI && window.electronAPI.notifyHideDone) {
            window.electronAPI.notifyHideDone();
          }
          return;
        }

        if (presenceAnimating) {
          pendingHideRequest = true;
          return;
        }

        const petElement = getPetElement();
        if (!petElement) {
          if (window.electronAPI && window.electronAPI.notifyHideDone) {
            window.electronAPI.notifyHideDone();
          }
          return;
        }

        presenceAnimating = true;
        quickActions.hide();
        hideInputPanel();
        setStatusBarVisible(false);
        proactiveBehavior.setSuppressed(true);
        setPetInteractionEnabled(false);
        petController.isMoving = true;
        petController.stopMovement();

        const edgeTarget = getExitTarget();
        await petController.moveToTargetAndWait(edgeTarget, { timeoutMs: 1400, arrivalThreshold: 14 });

        petElement.style.transition = 'opacity 180ms ease';
        petElement.style.opacity = '0';
        await new Promise((resolve) => setTimeout(resolve, 200));
        petElement.style.transition = '';

        if (window.electronAPI && window.electronAPI.notifyHideDone) {
          window.electronAPI.notifyHideDone();
        }

        hideInputPanel();
        petController.isMoving = false;
        setPetInteractionEnabled(true);
        isPetVisible = false;
        presenceAnimating = false;
      }

      function getTapMessage() {
        const status = petController.getStatusSummary();
        return status ? `当前状态：${status}` : '你好！我是你的 AI 桌面伙伴，有什么可以帮你的吗？';
      }

      function emitCareParticles(action) {
        const petElement = getPetElement();
        if (!petElement) {
          return;
        }

        const particleMap = {
          feed: { icon: '✦', color: 'rgba(255, 205, 96, 0.95)', count: 5, spread: 28, rise: 34 },
          pet: { icon: '♥', color: 'rgba(255, 116, 151, 0.95)', count: 6, spread: 34, rise: 42 },
          clean: { icon: '✧', color: 'rgba(138, 208, 255, 0.95)', count: 5, spread: 30, rise: 38 }
        };

        particleEffects.burstNearPet(petElement, particleMap[action] || particleMap.pet);
      }

      function performCareAction(action) {
        const actionMap = {
          feed: () => careSystem.feed(),
          pet: () => careSystem.pet(),
          clean: () => careSystem.clean()
        };

        const handler = actionMap[action];
        if (!handler) {
          return;
        }

        handler();
        memoryManager.record(`care:${action}`);
        petController.reactToCareAction(action);
        emitCareParticles(action);
      }

      async function loadGrowthDiary() {
        try {
          if (window.electronAPI && window.electronAPI.storeGet) {
            return (await window.electronAPI.storeGet('growthDiary')) || [];
          }
          const raw = localStorage.getItem('growthDiary');
          return raw ? JSON.parse(raw) : [];
        } catch (_error) {
          return [];
        }
      }

      async function appendGrowthDiary(entry) {
        const diary = await loadGrowthDiary();
        diary.push(entry);
        const snapshot = diary.slice(-50);
        if (window.electronAPI && window.electronAPI.storeSet) {
          window.electronAPI.storeSet('growthDiary', snapshot);
        } else {
          localStorage.setItem('growthDiary', JSON.stringify(snapshot));
        }
      }

      async function showGrowthDiary() {
        const diary = await loadGrowthDiary();
        if (diary.length === 0) {
          chatBubble.show('还没有成长记录，继续陪我就会有的。', 3500);
          return;
        }

        let panel = document.getElementById('growth-diary-panel');
        if (panel) {
          panel.remove();
        }

        panel = document.createElement('div');
        panel.id = 'growth-diary-panel';
        panel.className = 'growth-diary-panel';

        const entries = diary.slice(-20).reverse().map((entry) => {
          const date = new Date(entry.timestamp);
          const dateStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
          if (entry.type === 'levelup') {
            const abilityText = entry.abilities && entry.abilities.length > 0 ? `，解锁了 ${entry.abilities.join('、')}` : '';
            return `<div class="diary-entry"><span class="diary-date">${dateStr}</span><span class="diary-text">🎉 升到了 Lv.${entry.level}${abilityText}</span></div>`;
          }
          if (entry.type === 'evolve') {
            return `<div class="diary-entry"><span class="diary-date">${dateStr}</span><span class="diary-text">✨ 进化到"${entry.stageLabel}"阶段</span></div>`;
          }
          return '';
        }).join('');

        panel.innerHTML = `
          <div class="diary-header">
            <span>成长日记</span>
            <button type="button" class="diary-close" aria-label="关闭">✕</button>
          </div>
          <div class="diary-list">${entries || '<div class="diary-empty">暂无记录</div>'}</div>
        `;

        document.body.appendChild(panel);

        panel.querySelector('.diary-close').addEventListener('click', () => {
          panel.remove();
        });
      }

      const petErrorMessages = [
        '呜……我好像卡住了，再试一次好吗？',
        '刚才脑子转不过来了，你再说一遍？',
        '我出了点小状况，不过没事，再来！',
        '嗯？刚才没听清，可以再说一次吗？',
        '我打了个盹，错过了你说的话……'
      ];

      function getRandomPetError() {
        return petErrorMessages[Math.floor(Math.random() * petErrorMessages.length)];
      }

      async function submitInput() {
        const input = userInput.value.trim();
        if (!input) {
          return;
        }

        userInput.value = '';
        userInput.style.height = 'auto';
        clearTypingReaction();
        chatBubble.showLoading();

        try {
          if (commandManager.isCommand(input)) {
            const parsed = commandManager.parseCommand(input);
            const response = await commandManager.processCommand(parsed.command, parsed.args);
            positionInputPanel();
            await chatBubble.typeText(response, 5000, 12);
            voiceManager.speak(response);
          } else {
            setChatMood('confused');
            await chatManager.processInputStream(input, {
              onStart: () => {
                chatBubble.startStream();
                setChatMood('talking');
              },
              onChunk: (chunk) => {
                chatBubble.appendStream(chunk);
              },
              onDone: (content) => {
                chatBubble.finishStream(5000);
                voiceManager.speak(content);
                setChatMood('happy', { resetAfterMs: 3000 });
              },
              onError: () => {
                chatBubble.startStream();
                setChatMood('confused', { resetAfterMs: 2000 });
              }
            });
          }
        } catch (error) {
          console.error(error);
          chatBubble.show(getRandomPetError(), 4000);
          setChatMood('confused', { resetAfterMs: 2000 });
        }
      }

      await petController.init();
      chatBubble.init(petController);
      characterPicker.init(petController);
      await growthSystem.init({
        characterId: petController.currentCharacterId,
        characterConfig: petController.registry.get(petController.currentCharacterId)
      });
      petController.attachGrowthSystem(growthSystem);
      careSystem.setGrowthSystem(growthSystem);
      await careSystem.init();
      const initialCareState = careSystem.getState();
      updateStatusBar(initialCareState);
      setStatusBarVisible(false);
      positionStatusBar();
      await focusMode.init();
      await memoryManager.init();
      await weatherService.init();
      await chatManager.init(careSystem, growthSystem, memoryManager);
      commandManager.init(pomodoroTimer, petController, growthSystem, weatherService);
      await proactiveBehavior.init({ caterpillar: petController, chatBubble, careSystem, weatherService });
      quickActions.init({
        petController,
        onAction: (action) => {
          if (action === 'chat') {
            showInputPanel();
            chatBubble.show('现在再说，我会认真听。', 2400);
            return;
          }

          performCareAction(action);
        }
      });
      idleBehavior.init({ petController, chatBubble, careSystem });
      await settings.init({ petController, characterPicker });
      await petManager.init(petController, { hostElement: document.getElementById('pet-root'), characterPicker, chatBubble, growthSystem, weatherService });
      if (growthSystem.hasAbility('multi_pet')) {
        await petManager.loadSavedPets();
      }
      pomodoroTimer.init({ caterpillar: petController, chatBubble, focusMode, proactiveBehavior, memoryManager });
      window.addEventListener('focus:complete', function() {
        if (proactiveBehavior && typeof proactiveBehavior.triggerFocusDone === 'function') {
          proactiveBehavior.triggerFocusDone();
        }
      });
      await voiceManager.init({
        petController,
        inputField: userInput,
        triggerButton: voiceInputButton,
        submitInput,
        onStateChange: (state) => {
          if (state.type === 'listening') {
            chatBubble.show('我在听，你可以直接说。', 2200);
            return;
          }

          if (state.type === 'unsupported') {
            chatBubble.show('当前环境不支持语音输入。', 2600);
            return;
          }

          if (state.type === 'permission') {
            chatBubble.show('需要麦克风权限，请在系统设置里允许。', 3500);
            return;
          }

          if (state.type === 'error') {
            chatBubble.show('刚刚没有听清，我们再试一次。', 2600);
          }
        }
      });
      voiceInputButton.addEventListener('click', function(event) {
        if (!inputPanel.classList.contains('collapsed')) {
          return;
        }

        event.preventDefault();
        event.stopImmediatePropagation();
        showInputPanel();
      }, true);

      inputPanel.addEventListener('focusout', function() {
        window.setTimeout(() => {
          if (!isInputPanelExpanded()) {
            return;
          }

          if (inputPanel.contains(document.activeElement)) {
            return;
          }

          collapseInputPanel();
        }, 80);
      });

      hideInputPanel();

      const initialWeatherPayload = await weatherService.fetchWeather();
      if (initialWeatherPayload) {
        petController.applyWeatherState(initialWeatherPayload);
      }

      if (window.electronAPI && window.electronAPI.getSystemSnapshot) {
        const snapshot = await window.electronAPI.getSystemSnapshot();
        if (snapshot) {
          petController.applySystemMetrics(snapshot);
        }
      }

      growthSystem.onLevelUp = (payload) => {
        const abilities = payload.abilities.map((ability) => ability.name).join('、');
        const message = abilities ? `升级到 Lv.${payload.level}，解锁 ${abilities}！` : `升级到 Lv.${payload.level} 了！`;
        chatBubble.show(message, 5000);
        const petElement = getPetElement();
        if (petElement) {
          const rect = petElement.getBoundingClientRect();
          triggerLevelUpEffect(rect.left + rect.width / 2, rect.top);
        }
        appendGrowthDiary({
          type: 'levelup',
          level: payload.level,
          abilities: payload.abilities.map((ability) => ability.name),
          timestamp: Date.now()
        });
      };

      growthSystem.onStageChange = async (payload) => {
        if (payload.characterId === petController.currentCharacterId) {
          triggerEvolveEffect();
          await petController.evolveToCurrentStage();
          chatBubble.show(`✨ 进化了！成长到"${payload.stageLabel}"阶段。`, 5500);
        }
        appendGrowthDiary({
          type: 'evolve',
          stage: payload.stage,
          stageLabel: payload.stageLabel,
          timestamp: Date.now()
        });
      };

      growthSystem.onStateChange = (state) => {
        if (state.characterId === petController.currentCharacterId) {
          petController.applyGrowthState(state);
        }

        petManager.getAllPets().forEach((pet) => {
          if (pet.currentCharacterId === state.characterId) {
            pet.applyGrowthState(growthSystem.getCharacterState(pet.currentCharacterId));
          }
        });
      };

      weatherService.onUpdate = (payload) => {
        petController.applyWeatherState(payload);
        petManager.getAllPets().forEach((pet) => {
          if (pet !== petController) {
            pet.applyWeatherState(payload);
          }
        });
      };

      document.addEventListener('click', function(event) {
        if (presenceAnimating) {
          return;
        }

        if (quickActions.contains(event.target)) {
          return;
        }

        if (!petController.isPetTarget(event.target)) {
          if (!inputPanel.contains(event.target)) {
            quickActions.hide();
            hideInputPanel();
          }
          return;
        }

        if (event.detail > 1) {
          return;
        }

        if (singleTapTimer) {
          clearTimeout(singleTapTimer);
        }

        singleTapTimer = window.setTimeout(() => {
          petController.onTap();
          growthSystem.addInteraction('pet');
          memoryManager.record('pet:tap');
          window.dispatchEvent(new CustomEvent('pet:clicked', {
            detail: { instanceId: petController.instanceId }
          }));
          quickActions.showForPet();
          singleTapTimer = null;
        }, 220);
      });

      document.addEventListener('dblclick', function(event) {
        if (presenceAnimating) {
          return;
        }

        if (!petController.isPetTarget(event.target)) {
          return;
        }

        if (singleTapTimer) {
          clearTimeout(singleTapTimer);
          singleTapTimer = null;
        }

        petController.onDoubleTap();
        memoryManager.record('pet:double-tap');
      });

      sendButton.addEventListener('click', submitInput);

      userInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          submitInput();
          return;
        }

        if (event.key === 'Escape') {
          collapseInputPanel({ force: true });
        }
      });

      userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = `${Math.min(this.scrollHeight, 72)}px`;
        positionInputPanel();

        const hasValue = this.value.trim().length > 0;
        setTypingReactionActive(hasValue);
        if (hasValue) {
          setChatMood('listening', { resetAfterMs: 1200 });
        }
      });

      window.addEventListener('settings:visibility', function(event) {
        petController.isMoving = Boolean(event.detail && event.detail.visible);
        if (event.detail && event.detail.visible) {
          quickActions.hide();
          hideInputPanel();
          return;
        }

        if (!presenceAnimating) {
          // 设置关闭后不自动显示输入面板，等用户点击宠物
        }
      });

      window.addEventListener('character-picker:visibility', function(event) {
        petController.isMoving = Boolean(event.detail && event.detail.visible);
        if (event.detail && event.detail.visible) {
          quickActions.hide();
          hideInputPanel();
        }
      });

      window.addEventListener('pet-manager:visibility', function(event) {
        petController.isMoving = Boolean(event.detail && event.detail.visible);
        if (event.detail && event.detail.visible) {
          quickActions.hide();
          hideInputPanel();
        }
      });

      window.addEventListener('blur', function() {
        quickActions.hide();
        hideInputPanel();
      });

      window.addEventListener('settings:saved', async function(event) {
        const detail = event.detail || {};
        await weatherService.refresh();
        if (typeof detail.voiceReplyEnabled !== 'undefined') {
          await voiceManager.setReplyEnabled(detail.voiceReplyEnabled);
        }
        const hasLlmConfig = Boolean(settings.apiKeyField && settings.apiKeyField.value.trim());
        const message = detail.characterChanged
          ? '角色已切换，设置也保存了。'
          : (hasLlmConfig ? '设置已保存，之后会优先使用真实 LLM 回复。' : '设置已保存。');

        chatBubble.show(message, 4500);
      });

      window.addEventListener('pet:double-tap', function(event) {
        if (!isPrimaryPetEvent(event.detail)) {
          return;
        }

        particleEffects.burstNearPet(getPetElement(), { icon: '♥', color: 'rgba(255, 116, 151, 0.95)', count: 8, spread: 42, rise: 48 });
        chatBubble.show('哇，被你双击得好开心。', 3600);
      });

      window.addEventListener('pet:petting-gesture', function(event) {
        if (!isPrimaryPetEvent(event.detail)) {
          return;
        }

        performCareAction('pet');
        memoryManager.record('pet:gesture');
        chatBubble.show('这次摸摸很专业，我记住了。', 3600);
      });

      window.addEventListener('pet:character-switched', async function(event) {
        if (!event.detail || event.detail.instanceId !== petController.instanceId) {
          return;
        }

        if (chatMoodResetTimer) {
          clearTimeout(chatMoodResetTimer);
          chatMoodResetTimer = null;
        }

        await growthSystem.setCharacter(event.detail.characterId, petController.registry.get(event.detail.characterId));
        positionInputPanel();
      });

      window.addEventListener('care:update', function(event) {
        const detail = event.detail || {};
        if (detail.state) {
          petController.applyCareState(detail.state);
          updateStatusBar(detail.state);

          const petElement = getPetElement();
          if (petElement) {
            const mood = detail.derivedMood || 'normal';
            const avgState = (detail.state.hunger + detail.state.cleanliness + detail.state.affection) / 3;
            let moodLevel = 'happy';
            if (mood === 'sad') {
              moodLevel = 'sad';
            } else if (mood === 'hungry') {
              moodLevel = 'hungry';
            } else if (avgState < 40) {
              moodLevel = 'low';
            } else if (avgState > 70) {
              moodLevel = 'happy';
            } else {
              moodLevel = 'normal';
            }
            petElement.dataset.careMood = moodLevel;
          }

          const quickMenuEl = document.querySelector('#quick-actions .quick-menu');
          if (quickMenuEl) {
            const feedBtn = quickMenuEl.querySelector('[data-action="feed"]');
            const cleanBtn = quickMenuEl.querySelector('[data-action="clean"]');
            const petBtn = quickMenuEl.querySelector('[data-action="pet"]');
            if (feedBtn) {
              feedBtn.classList.toggle('needs-attention', detail.state.hunger < 30);
            }
            if (cleanBtn) {
              cleanBtn.classList.toggle('needs-attention', detail.state.cleanliness < 30);
            }
            if (petBtn) {
              petBtn.classList.toggle('needs-attention', detail.state.affection < 30);
            }
          }
        }

        if (detail.message) {
          chatBubble.show(detail.message, 4000);
        }
      });

      window.addEventListener('weather:updated', function(event) {
        if (event.detail && event.detail.moodEffect && growthSystem.hasAbility('weather_sense')) {
          chatBubble.show(event.detail.moodEffect.reason, 3200);
        }
      });

      window.addEventListener('system:stress', function(event) {
        if (event.detail && event.detail.message) {
          chatBubble.show(event.detail.message, 2800);
        }
      });

      if (window.electronAPI && window.electronAPI.onSystemMetrics) {
        window.electronAPI.onSystemMetrics(function(metrics) {
          petController.applySystemMetrics(metrics);
          petManager.getAllPets().forEach((pet) => {
            if (pet !== petController) {
              pet.applySystemMetrics(metrics);
            }
          });

          if (metrics.cpuUsage >= 80) {
            window.dispatchEvent(new CustomEvent('system:stress', {
              detail: { message: '电脑有点忙，我也跟着紧张起来了。' }
            }));
          }
        });
      }

      if (window.electronAPI && window.electronAPI.onPetShow) {
        window.electronAPI.onPetShow(() => {
          runEntranceAnimation({ edge: 'left' });
        });
      }

      if (window.electronAPI && window.electronAPI.onPetHide) {
        window.electronAPI.onPetHide(() => {
          runExitAnimation();
        });
      }

      if (window.electronAPI && window.electronAPI.onPetShowWithVoice) {
        window.electronAPI.onPetShowWithVoice(() => {
          runEntranceAnimation({ edge: 'left', withVoice: true });
        });
      }

      const shouldRunOnboarding = await onboardingGuide.shouldRun();
      if (shouldRunOnboarding) {
        proactiveBehavior.setSuppressed(true);
        onboardingGuide.start({
          runEntrance: () => runEntranceAnimation({
            edge: 'left',
            keepSuppressed: true,
            target: {
              x: Math.round(window.innerWidth * 0.35),
              y: Math.round(window.innerHeight * 0.55)
            }
          }),
          onWaitForClick: () => {
            quickActions.hide();
          },
          onFinished: () => {
            proactiveBehavior.setSuppressed(false);
          }
        }).catch((error) => {
          console.error('onboarding failed:', error);
          proactiveBehavior.setSuppressed(false);
        });
      }

      if (window.electronAPI && window.electronAPI.onContextMenuAction) {
        window.electronAPI.onContextMenuAction(function(action) {
          const actionMap = {
            feed: () => performCareAction('feed'),
            pet: () => performCareAction('pet'),
            clean: () => performCareAction('clean'),
            pomodoro: () => pomodoroTimer.start(),
            'pomodoro-stop': () => pomodoroTimer.stop(),
            'growth-diary': () => showGrowthDiary(),
            settings: () => showSettings(),
            'add-pet': () => petManager.requestAddPet(),
            'manage-pets': () => petManager.showManager()
          };

          const handler = actionMap[action];
          if (!handler) {
            return;
          }

          handler();
        });
      }

      window.addEventListener('pet:move', function(event) {
        if (!event.detail || event.detail.instanceId !== petController.instanceId) {
          return;
        }

        if (!inputPanel.classList.contains('hidden')) {
          positionInputPanel();
        }

        if (!chatBubble.element.classList.contains('hidden')) {
          chatBubble.positionNearPet(false, event.detail);
        }
      });
    });
  </script>
</body>
</html>
